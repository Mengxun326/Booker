name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ============================================================
  # LINUX (Ubuntu)
  # ============================================================
  build-linux:
    name: Build - Linux (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libfreetype-dev \
            libudev-dev

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Package
        run: |
          mkdir -p package
          cp bin/release/GameOfLife package/
          cp -r locales package/
          cd package
          zip -r ../GameOfLife-${{ github.ref_name }}-linux.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: GameOfLife-${{ github.ref_name }}-linux.zip

  # ============================================================
  # MACOS ARM64 (Apple Silicon)
  # ============================================================
  build-macos-arm64:
    name: Build - macOS ARM64
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Package
        run: |
          mkdir -p package
          cp bin/release/GameOfLife package/
          cp -r locales package/
          cd package
          zip -r ../GameOfLife-${{ github.ref_name }}-macos-arm64.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: GameOfLife-${{ github.ref_name }}-macos-arm64.zip

  # ============================================================
  # MACOS x86_64 (Intel)
  # ============================================================
  # build-macos-x86_64:
    # name: Build - macOS x86_64
    # runs-on: macos-13

    # steps:
      # - name: Checkout
        # uses: actions/checkout@v4

      # - name: Configure
        # run: cmake --preset release

      # - name: Build
        # run: cmake --build --preset release

      # - name: Package
        # run: |
          # mkdir -p package
          # cp bin/release/GameOfLife package/
          # cp -r locales package/
          # cd package
          # zip -r ../GameOfLife-${{ github.ref_name }}-macos-x86_64.zip .

      # - name: Upload artifact
        # uses: actions/upload-artifact@v4
        # with:
          # name: macos-x86_64
          # path: GameOfLife-${{ github.ref_name }}-macos-x86_64.zip

  # ============================================================
  # WINDOWS (MSVC)
  # ============================================================
  build-windows:
    name: Build - Windows (MSVC)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release --config Release

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package
          Copy-Item bin/release/Release/GameOfLife.exe package/
          Copy-Item -Recurse locales package/
          Compress-Archive -Path package/* -DestinationPath "GameOfLife-${{ github.ref_name }}-windows-portable.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: GameOfLife-${{ github.ref_name }}-windows-portable.zip

  # ============================================================
  # RELEASE
  # ============================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos-arm64, build-windows] #, build-macos-x86_64]
    
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${{ github.ref_name }}
          VERSION_NO_V=${VERSION#v}
          # Extraire le bloc entre ce tag et le précédent dans CHANGELOG.md
          NOTES=$(awk "/^## \[${VERSION_NO_V}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          # Écrire dans un fichier pour éviter les problèmes d'échappement
          echo "$NOTES" > release_notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            artifacts/linux/GameOfLife-${{ github.ref_name }}-linux.zip
            artifacts/macos-arm64/GameOfLife-${{ github.ref_name }}-macos-arm64.zip
            artifacts/windows/GameOfLife-${{ github.ref_name }}-windows-portable.zip
        #    artifacts/macos-x86_64/GameOfLife-${{ github.ref_name }}-macos-x86_64.zip